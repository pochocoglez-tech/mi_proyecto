<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:30px;
            border-radius:10px;
            width:300px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
        }

        button{
            width:100%;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

    </style>

</head>
<body>

<div class="login-box">

    <h2>Iniciar Sesión</h2>

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Entrar</button>

    </form>

</div>

</body>
</html>
