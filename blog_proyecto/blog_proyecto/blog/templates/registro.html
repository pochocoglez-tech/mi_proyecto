<!DOCTYPE html>
<html>
<head>
    <title>Registro</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .registro-box{
            background:white;
            padding:30px;
            border-radius:12px;
            width:350px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }

        form p{
            display:flex;
            flex-direction:column;
            margin-bottom:15px;
        }

        input{
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            margin-top:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#218838;
        }

        ul{
            font-size:14px;
            color:#555;
        }

        a{
            text-decoration:none;
            color:#007bff;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
        }

    </style>

</head>
<body>

<div class="registro-box">

    <h2>Crear Cuenta</h2>

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Registrarse</button>

    </form>

    <div class="login-link">

        <p>
            ¿Ya tienes cuenta?
            <a href="/accounts/login/">Inicia sesión</a>
        </p>

    </div>

</div>

</body>
</html>
